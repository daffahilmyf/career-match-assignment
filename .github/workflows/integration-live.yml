name: Live Integration

on:
  workflow_dispatch:

jobs:
  integration-live:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pelgo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d pelgo"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pelgo
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Verify live integration flow
        run: >-
          uv run pytest
          tests/test_integration_flow.py
          -m integration
          -vv
          -s
          --log-cli-level=INFO
