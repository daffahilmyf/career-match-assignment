services:
  db:
    image: postgres:16
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pelgo"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pelgo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    build: .
    command:
      - sh
      - -lc
      - |
        until pg_isready -h db -p 5432; do
          echo "waiting for db";
          sleep 2;
        done;
        alembic upgrade head;
        python scripts/seed.py
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/pelgo
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/pelgo
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      RESEARCH_TIME_CAP_SECONDS: ${RESEARCH_TIME_CAP_SECONDS:-25}
      TOP_GAP_LIMIT: ${TOP_GAP_LIMIT:-3}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-1}
    ports:
      - "8000:8000"

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "pelgo.worker_main"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/pelgo
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      RESEARCH_TIME_CAP_SECONDS: ${RESEARCH_TIME_CAP_SECONDS:-25}
      TOP_GAP_LIMIT: ${TOP_GAP_LIMIT:-3}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-1}

volumes:
  pgdata:
